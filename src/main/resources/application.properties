spring.application.name=watermoniter
spring.profiles.default=local
server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

server.forward-headers-strategy=framework

openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-5}
openai.responses.url=https://api.openai.com/v1/responses

alerts.channels=${ALERT_CHANNELS:email,sms,whatsapp}

notifications.email.enabled=${EMAIL_ALERTS_ENABLED:false}
notifications.email.from=${EMAIL_ALERTS_FROM:}
notifications.email.to=${EMAIL_ALERTS_TO:}

notifications.twilio.enabled=${TWILIO_ENABLED:false}
notifications.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
notifications.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
notifications.twilio.from-sms=${TWILIO_FROM_SMS:}
notifications.twilio.to-sms=${TWILIO_TO_SMS:}
notifications.twilio.from-whatsapp=${TWILIO_FROM_WHATSAPP:}
notifications.twilio.to-whatsapp=${TWILIO_TO_WHATSAPP:}
