version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: watermoniter-postgres
    environment:
      POSTGRES_DB: watermoniter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d watermoniter"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: watermoniter-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/watermoniter
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data:
